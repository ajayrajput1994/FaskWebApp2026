<!-- app/templates/auth/email/welcome.html -->
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to MyApp</title>
  </head>

  <body style="margin:0; padding:0; background:#f5f5f5; font-family:Arial,sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5; padding:40px 20px;">
      <tr>
        <td align="center">

          <!-- Email card -->
          <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px;
                      border:0.5px solid #e0e0e0; overflow:hidden;">

            <!-- Header bar -->
            <tr>
              <td style="background:#4a7cf7; padding:32px 40px;">
                <h1 style="margin:0; color:#ffffff; font-size:22px;
                          font-weight:500;">MyApp</h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding:36px 40px;">
                <h2 style="margin:0 0 16px; font-size:20px;
                          font-weight:500; color:#1a1a1a;">
                  Welcome, {{ username }}!
                </h2>
                <p style="margin:0 0 16px; font-size:15px;
                         line-height:1.6; color:#555;">
                  Your account has been created successfully.
                  You can now log in and explore the dashboard.
                </p>
                <p style="margin:0 0 28px; font-size:15px;
                         line-height:1.6; color:#555;">
                  If you have any questions, just reply to this email.
                </p>

                <!-- Button -->
                <table cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background:#4a7cf7; border-radius:8px;">
                      <a href="{{ url_for('auth.login', _external=True) }}" style="display:inline-block; padding:12px 28px;
                              color:#ffffff; text-decoration:none;
                              font-size:15px; font-weight:500;">
                        Go to Dashboard
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:20px 40px; border-top:0.5px solid #f0f0f0;
                        background:#fafafa;">
                <p style="margin:0; font-size:12px; color:#999;">
                  You received this because you registered at MyApp.
                  If this was not you, please ignore this email.
                </p>
              </td>
            </tr>

          </table>
          <!-- /Email card -->

        </td>
      </tr>
    </table>

  </body>

</html>
